<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <script src="//unpkg.com/react@17.0.2/umd/react.development.js" crossorigin></script>
  <script src="//unpkg.com/react-dom@17.0.2/umd/react-dom.development.js" crossorigin></script>
  <script src="//unpkg.com/babel-standalone@6/babel.min.js"></script>
</head>

<body>
  <div id="root"></div>
  <script type="text/babel">
    /**
     * React.memo是控制是否渲染组件
     * useMemo是缓存计算结果
     * useCallback是缓存函数 防止函数在每次渲染时都重新创建
     * 
     * useCallback的出现并不是必须出现React.memo
     * useCallback 只是让函数引用稳定，useMemo 让值稳定，它们不控制渲染。
     * React.memo 才是控制组件是否重新渲染的关键。
     * 如果想避免“父组件导致子组件多次渲染”，useCallback 需要和 React.memo 搭配，但 useCallback 在其他场景（例如 useEffect 的依赖稳定）也单独有意义。
      */
    const { useEffect, useMemo, useState } = React;

    let Child = ({ data, handleClick }) => {
      console.log('Child render');
      return (
        <button onClick={handleClick}>{data.number}</button>
      )
    }
    Child = React.memo(Child);

    function App () {
      console.log('App render');
      const [name, setName] = React.useState('zhufeng');
      const [number, setNumber] = React.useState(0);
      let data = React.useMemo(() => ({ number }), [number]);
      let handleClick = React.useCallback(() => setNumber(number + 1), [number]);
      // let handleClick = () => setNumber(number + 1);
      return (
        <div>
          <input type="text" value={name} onChange={event => setName(event.target.value)} />
          <Child data={{number}} />
        </div>
      )
    }

    ReactDOM.render(
      <App />,
      document.getElementById('root')
    );
  </script>
</body>

</html>

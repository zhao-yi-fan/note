<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <script src="//unpkg.com/react@17.0.2/umd/react.development.js" crossorigin></script>
  <script src="//unpkg.com/react-dom@17.0.2/umd/react-dom.development.js" crossorigin></script>
  <script src="//unpkg.com/babel-standalone@6/babel.min.js"></script>
</head>

<body>
  <div id="app">

  </div>
  <script type="text/babel">
    const { useRef, useEffect, useLayoutEffect } = React;
    function App () {
      const divRef = useRef()

      // useLayoutEffect 会在浏览器渲染前执行
      // useEffect 会在浏览器渲染后执行，如果有dom变化可能会有闪烁
      useEffect(() => {
        console.log(divRef.current);

        divRef.current.style.opacity = 1
      }, [])

      return (
        <div>
          <div ref={divRef} style={{ background: 'red', height: '500px', width: '500px', opacity: 0.5 }}></div>
        </div>
      )
    }

    ReactDOM.render(<App />, document.getElementById('app'));
  </script>

</body>

</html>

<!DOCTYPE html>
<html>
<head>
    <title>仓库文件查看器</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://unpkg.com/highlight.js@11.9.0/styles/github.css">
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
        .card { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 24px; }
        .header { margin-bottom: 20px; }
        .header h1 { margin: 0 0 12px 0; font-size: 20px; font-weight: 600; }
        .breadcrumb { display: flex; align-items: center; gap: 8px; color: #666; font-size: 14px; flex-wrap: wrap; }
        .breadcrumb a { color: #1890ff; text-decoration: none; cursor: pointer; }
        .breadcrumb a:hover { text-decoration: underline; }
        .breadcrumb span { color: #333; }
        .file-list { list-style: none; margin: 0; padding: 0; }
        .file-item { padding: 12px 16px; border-radius: 6px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; }
        .file-item:hover { background: #f5f5f5; }
        .file-item .icon { margin-right: 10px; font-size: 16px; }
        .file-item.directory { font-weight: 500; color: #1890ff; }
        .file-item .size { margin-left: auto; color: #999; font-size: 12px; }
        .actions { margin-bottom: 16px; display: flex; gap: 8px; }
        .btn { padding: 6px 16px; border: 1px solid #d9d9d9; border-radius: 4px; background: white; cursor: pointer; font-size: 14px; }
        .btn:hover { border-color: #1890ff; color: #1890ff; }
        .code-viewer pre { margin: 0; padding: 16px; background: #f6f8fa; border-radius: 6px; overflow-x: auto; }
        .code-viewer code { font-family: 'SF Mono', Consolas, 'Liberation Mono', Menlo, monospace; font-size: 13px; line-height: 1.5; }
        .loading { text-align: center; padding: 40px; color: #999; }
        .error { padding: 20px; background: #fff2f0; border: 1px solid #ffccc7; border-radius: 4px; color: #ff4d4f; }
    </style>
</head>
<body>
    <div id="app" class="container"></div>

    <script src="https://unpkg.com/highlight.js@11.9.0/lib/index.js"></script>
    <script>
        // Svelte 风格的状态管理 - 使用 Proxy 实现响应式
        function reactive(initial) {
            const state = {};
            const subscribers = new Set();
            
            for (const key in initial) {
                let value = initial[key];
                Object.defineProperty(state, key, {
                    get() { return value; },
                    set(newValue) {
                        value = newValue;
                        subscribers.forEach(fn => fn());
                    }
                });
            }
            
            state.$subscribe = (fn) => {
                subscribers.add(fn);
                return () => subscribers.delete(fn);
            };
            
            return state;
        }

        const username = 'zhao-yi-fan';
        const repo = 'study';
        const branch = 'master';
        const apiBaseUrl = `https://api.github.com/repos/${username}/${repo}/contents`;

        const params = new URLSearchParams(window.location.search);
        const urlToken = params.get('token');
        if (urlToken) {
            localStorage.setItem('github_token', urlToken);
        }
        const token = localStorage.getItem('github_token') || '';
        
        const headers = {
            'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
            ...(token && { 'Authorization': `token ${token}` })
        };

        function getTokenParam() {
            return token ? `&token=${token}` : '';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatSize(bytes) {
            if (!bytes) return '';
            const units = ['B', 'KB', 'MB', 'GB'];
            let i = 0;
            while (bytes >= 1024 && i < units.length - 1) {
                bytes /= 1024;
                i++;
            }
            return bytes.toFixed(1) + ' ' + units[i];
        }

        // Svelte 风格的状态
        const state = reactive({
            currentPath: params.get('path') || '',
            isViewingFile: params.get('view') === '1',
            loading: false,
            error: '',
            contents: [],
            fileContent: '',
            currentFile: null,
            isImage: false
        });

        // 计算属性
        function getBreadcrumbs() {
            if (!state.currentPath) return [];
            const parts = state.currentPath.split('/');
            const crumbs = [];
            let path = '';
            parts.forEach(part => {
                path += path ? '/' + part : part;
                crumbs.push({ name: part, path });
            });
            return crumbs;
        }

        function getHighlightedCode() {
            if (!state.fileContent || !state.currentFile) return '';
            const ext = state.currentFile.name.split('.').pop() || '';
            const langMap = {
                'js': 'javascript', 'ts': 'typescript', 'json': 'json',
                'html': 'xml', 'xml': 'xml', 'css': 'css', 'py': 'python',
                'sh': 'bash', 'md': 'markdown', 'yaml': 'yaml', 'yml': 'yaml',
                'sql': 'sql', 'go': 'go', 'java': 'java', 'c': 'c', 'cpp': 'cpp',
                'vue': 'xml', 'jsx': 'javascript', 'tsx': 'typescript'
            };
            const lang = langMap[ext] || 'plaintext';
            try {
                return hljs.highlight(state.fileContent, { language: lang }).value;
            } catch {
                return escapeHtml(state.fileContent);
            }
        }

        function getRawUrl() {
            return state.currentFile 
                ? `https://raw.githubusercontent.com/${username}/${repo}/${branch}/${state.currentFile.path}`
                : '';
        }

        function getGithubUrl() {
            return state.currentFile
                ? `https://github.com/${username}/${repo}/blob/${branch}/${state.currentFile.path}`
                : '';
        }

        // 渲染函数
        function render() {
            const breadcrumbs = getBreadcrumbs();
            const app = document.getElementById('app');
            
            let html = `
                <div class="card">
                    <div class="header">
                        <h1>📁 仓库文件浏览器</h1>
                        ${breadcrumbs.length > 0 ? `
                            <div class="breadcrumb">
                                <a href="" onclick="event.preventDefault(); goToPath('')">根目录</a>
                                ${breadcrumbs.map((item, index) => `
                                    <span>
                                        / ${index < breadcrumbs.length - 1 
                                            ? `<a href="" onclick="event.preventDefault(); goToPath('${item.path}')">${item.name}</a>`
                                            : `<span>${item.name}</span>`
                                        }
                                    </span>
                                `).join('')}
                            </div>
                        ` : ''}
                    </div>
            `;
            
            if (state.loading) {
                html += `<div class="loading">加载中...</div>`;
            }
            
            if (state.error) {
                html += `<div class="error">${escapeHtml(state.error)}</div>`;
            }
            
            if (!state.loading && !state.error && state.isViewingFile) {
                if (state.isImage) {
                    html += `
                        <div>
                            <div class="actions">
                                <button class="btn" onclick="goBack()">← 返回</button>
                                <button class="btn" onclick="window.open('${getRawUrl()}', '_blank')">Raw</button>
                                <button class="btn" onclick="window.open('${getGithubUrl()}', '_blank')">GitHub</button>
                            </div>
                            <div class="image-viewer" style="text-align: center;">
                                <img src="${escapeHtml(state.fileContent)}" style="max-width: 100%;" />
                            </div>
                        </div>
                    `;
                } else {
                    html += `
                        <div>
                            <div class="actions">
                                <button class="btn" onclick="goBack()">← 返回</button>
                                <button class="btn" onclick="window.open('${getRawUrl()}', '_blank')">Raw</button>
                                <button class="btn" onclick="window.open('${getGithubUrl()}', '_blank')">GitHub</button>
                            </div>
                            <div class="code-viewer">
                                <pre><code>${getHighlightedCode()}</code></pre>
                            </div>
                        </div>
                    `;
                }
            }
            
            if (!state.loading && !state.error && !state.isViewingFile) {
                html += `
                    <ul class="file-list">
                        ${state.contents.map(item => `
                            <li class="file-item ${item.type === 'dir' ? 'directory' : ''}" 
                                onclick="${item.type === 'dir' ? `goToPath('${item.path}')` : `viewFile('${item.path}')`}">
                                <span class="icon">${item.type === 'dir' ? '📁' : '📄'}</span>
                                <span class="name">${escapeHtml(item.name)}</span>
                                <span class="size">${formatSize(item.size)}</span>
                            </li>
                        `).join('')}
                    </ul>
                `;
            }
            
            html += `</div>`;
            app.innerHTML = html;
        }

        async function loadContents(path = '') {
            state.loading = true;
            state.error = '';
            state.currentPath = path;
            state.isViewingFile = false;
            window.history.pushState({}, '', `?path=${path}${getTokenParam()}`);

            try {
                const response = await fetch(`${apiBaseUrl}/${path}?ref=${branch}`, { headers });
                if (!response.ok) throw new Error(`获取目录失败: ${response.status}`);
                const data = await response.json();
                state.contents = Array.isArray(data) ? data : [];
            } catch (e) {
                state.error = e.message;
            } finally {
                state.loading = false;
            }
        }

        async function loadFile(filePath) {
            state.loading = true;
            state.error = '';
            state.currentPath = filePath;
            state.isViewingFile = true;
            window.history.pushState({}, '', `?path=${filePath}&view=1${getTokenParam()}`);

            try {
                const response = await fetch(`${apiBaseUrl}/${filePath}?ref=${branch}`, { headers });
                if (!response.ok) throw new Error(`获取文件失败: ${response.status}`);
                const file = await response.json();
                state.currentFile = file;

                const ext = file.name.split('.').pop().toLowerCase() || '';
                const imageExts = ['png', 'jpg', 'jpeg', 'gif', 'webp', 'svg', 'ico', 'bmp'];
                state.isImage = imageExts.includes(ext);

                let content = '';
                if (file.content) {
                    if (state.isImage) {
                        const mimeTypes = {
                            'png': 'image/png', 'jpg': 'image/jpeg', 'jpeg': 'image/jpeg',
                            'gif': 'image/gif', 'webp': 'image/webp', 'svg': 'image/svg+xml',
                            'ico': 'image/x-icon', 'bmp': 'image/bmp'
                        };
                        const mime = mimeTypes[ext] || 'image/png';
                        content = `data:${mime};base64,${file.content.replace(/\n/g, '')}`;
                    } else {
                        const binary = atob(file.content.replace(/\n/g, ''));
                        content = new TextDecoder('utf-8').decode(Uint8Array.from(binary, c => c.charCodeAt(0)));
                    }
                } else {
                    const rawResponse = await fetch(`https://raw.githubusercontent.com/${username}/${repo}/${branch}/${filePath}`);
                    content = await rawResponse.text();
                }
                state.fileContent = content;
            } catch (e) {
                state.error = e.message;
            } finally {
                state.loading = false;
            }
        }

        function goToPath(path) {
            loadContents(path);
        }

        function viewFile(filePath) {
            loadFile(filePath);
        }

        function goBack() {
            const parentPath = state.currentPath.split('/').slice(0, -1).join('/');
            loadContents(parentPath);
        }

        // 订阅状态变化，自动重新渲染
        state.$subscribe(render);

        // 初始化
        if (state.isViewingFile) {
            loadFile(state.currentPath);
        } else {
            loadContents(state.currentPath);
        }
    </script>
</body>
</html>

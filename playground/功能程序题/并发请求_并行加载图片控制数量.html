<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <script>
    // 有 8 张图片 url，你需要并发去获取它，并且任何时刻同时请求的数量不超过 3 个。也就是说第 4 张图片一定是等前面那一批有一个请求完毕了才能开始，以此类推。
    var urls = [
      "https://www.kkkk1000.com/images/getImgData/getImgDatadata.jpg",
      "https://www.kkkk1000.com/images/getImgData/gray.gif",
      "https://www.kkkk1000.com/images/getImgData/Particle.gif",
      "https://www.kkkk1000.com/images/getImgData/arithmetic.png",
      "https://www.kkkk1000.com/images/getImgData/arithmetic2.gif",
      "https://www.kkkk1000.com/images/getImgData/getImgDataError.jpg",
      "https://www.kkkk1000.com/images/getImgData/arithmetic.gif",
      "https://www.kkkk1000.com/images/wxQrCode2.png",
    ];

    /**
     * 限制并发请求数量
     * @param {string[]} urls 待请求的url数组
     * @param {number} maxNum 最大并发数
     * @param {(url: string) => Promise<any>} requestFn 请求函数
     */
    async function concurrentRequest (urls, maxNum, requestFn = fetch) {
      const results = new Array(urls.length);
      let nextIndex = 0;

      async function worker () {
        while (nextIndex < urls.length) {
          const currentIndex = nextIndex++;

          try {
            results[currentIndex] = await requestFn(urls[currentIndex]);
          } catch (error) {
            results[currentIndex] = error;
          }
        }
      }

      const workerCount = Math.min(urls.length, maxNum);
      await Promise.all(Array.from({ length: workerCount }, worker));

      return results;
    }

    concurrentRequest(urls, 3).then((res) => {
      console.log(res);
    })
  </script>
</body>

</html>
